{{ define "main" }}
<section class="section">
  <div class="container">
    <div class="section-header">
      <span class="section-label">Get in Touch</span>
      <h1>Contact Us</h1>
    </div>

    <div class="contact-grid">
      <!-- Info -->
      <div class="contact-info">
        <h3>Shree Ram Mandir EPA</h3>

        <div class="contact-detail">
          <span class="contact-detail-icon">📍</span>
          <div>
            <strong>Address</strong><br>
            2777 Hunter St<br>
            East Palo Alto, CA 94303
          </div>
        </div>

        <div class="contact-detail">
          <span class="contact-detail-icon">✉️</span>
          <div>
            <strong>Email</strong><br>
            <a href="mailto:epamandir@gmail.com">epamandir@gmail.com</a>
          </div>
        </div>

        <div class="contact-detail">
          <span class="contact-detail-icon">🕌</span>
          <div>
            <strong>About</strong><br>
            Located ~25 miles south of SFO,<br>just off the Dumbarton Bridge
          </div>
        </div>

        <div style="margin-top:2rem;">
          <div class="map-wrap">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3168.2!2d-122.1386!3d37.4664!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fa3c547a647f9%3A0x0!2s2777+Hunter+St%2C+East+Palo+Alto%2C+CA+94303!5e0!3m2!1sen!2sus!4v1"
              allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>

      <!-- Web3Forms Contact Form -->
      <div>
        <h3 style="margin-bottom:1.5rem;">Send a Message</h3>
        <form action="https://api.web3forms.com/submit" method="POST" id="contactForm">
          <input type="hidden" name="access_key" value="{{ .Site.Params.web3formsKey }}">
          <input type="hidden" name="subject" value="Message from Shree Ram Mandir website">
          <input type="hidden" name="redirect" value="/thank-you/">
          <input type="checkbox" name="botcheck" style="display:none;">

          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="Full name">
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="topic">
              <option value="">Select a topic</option>
              <option value="General Enquiry">General Enquiry</option>
              <option value="Events & Programs">Events & Programs</option>
              <option value="Donation">Donation</option>
              <option value="Volunteer">Volunteer</option>
              <option value="Construction Project">Construction Project</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
{{ end }}
